{% extends "base.html" %}
{% block title %}Edit Playlist{% endblock %}
{% block content %}

<div style="max-width:480px;margin:0 auto;">
  <div class="studio-header">
    <h1 style="font-size:1.375rem;">Edit Playlist</h1>
    <a href="/backingtracks/" style="font-size:0.75rem;color:var(--studio-muted);text-decoration:none;">Back</a>
  </div>

  <form method="post" enctype="multipart/form-data" style="background:var(--studio-panel);border:1px solid var(--studio-border);border-radius:var(--radius-lg);padding:1.5rem;">
    {% csrf_token %}
    <div style="margin-bottom:1rem;">
      {% if playlist.image %}
      <img src="{{ playlist.image.url }}" alt="" style="width:100%;height:140px;object-fit:cover;border-radius:var(--radius-md);margin-bottom:0.75rem;">
      {% endif %}
      <label style="display:block;font-size:0.75rem;color:var(--studio-muted);margin-bottom:0.375rem;">Cover Image</label>
      <input type="file" name="image" accept="image/*" style="width:100%;padding:0.5rem;border-radius:var(--radius-sm);border:1px solid var(--studio-border);background:var(--studio-surface);color:var(--studio-text);font-size:0.75rem;font-family:var(--font-mono);">
    </div>
    <div style="margin-bottom:1rem;">
      <label style="display:block;font-size:0.75rem;color:var(--studio-muted);margin-bottom:0.375rem;">Name</label>
      <input type="text" name="name" value="{{ playlist.name }}" required style="width:100%;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);border:1px solid var(--studio-border);background:var(--studio-surface);color:var(--studio-text);font-size:0.8125rem;font-family:var(--font-body);">
    </div>
    <div style="margin-bottom:1.25rem;">
      <label style="display:block;font-size:0.75rem;color:var(--studio-muted);margin-bottom:0.375rem;">Description</label>
      <textarea name="description" rows="3" style="width:100%;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);border:1px solid var(--studio-border);background:var(--studio-surface);color:var(--studio-text);font-size:0.8125rem;font-family:var(--font-body);resize:vertical;">{{ playlist.description }}</textarea>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button type="submit" class="btn-studio">Save</button>
      <a href="/backingtracks/" style="padding:0.5rem 1rem;border-radius:var(--radius-sm);font-size:0.8125rem;color:var(--studio-muted);text-decoration:none;border:1px solid var(--studio-border);">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
